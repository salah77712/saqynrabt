name = "saqyn-backend"
main = "index.ts"
compatibility_date = "2026-07-04"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_ENV = "production"
VOICE_AI_ACTIVATED = "true"
PINECONE_INDEX_NAME = "saqyn-rag"
PINECONE_INDEX_HOST = "saqyn-rag-sl2iiwr.svc.aped-4627-b74a.pinecone.io"
R2_BUCKET_NAME = "saqyn-documents"
EMAIL_API_KEY = "re_***"


[[r2_buckets]]
binding = "BUCKET"
bucket_name = "saqyn-documents"

[[queues.producers]]
queue = "saqyn-doc-ingestion"
binding = "INGESTION_QUEUE"

[[queues.consumers]]
queue = "saqyn-doc-ingestion"
max_batch_size = 5
max_batch_timeout = 30
