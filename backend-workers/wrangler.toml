name = "saqyn-backend"
main = "index.ts"
compatibility_date = "2026-07-04"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[routes]]
pattern = "api.saqynrabt.com/*"
zone_name = "saqynrabt.com"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "saqyn-documents"

[[queues.producers]]
queue = "saqyn-doc-ingestion"
binding = "INGESTION_QUEUE"

[[queues.consumers]]
queue = "saqyn-doc-ingestion"
max_batch_size = 5
max_batch_timeout = 30
