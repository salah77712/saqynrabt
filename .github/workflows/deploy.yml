name: Deploy SAQYN RABT Platform

on:
  push:
    branches:
      - main
      - staging
    tags:
      - 'v*'

jobs:
  build_frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm --prefix frontend install

      - name: Build Next.js Bundle
        run: npm --prefix frontend run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

  build_backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Cloudflare Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        working-directory: ./backend-workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  test_suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Backend Dependencies
        run: npm --prefix backend-workers install

      - name: Run Backend Integration Test Suite
        run: npm --prefix backend-workers run test
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
