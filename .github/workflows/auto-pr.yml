name: Auto-create PR

on:
  push:
    branches:
      - fix/metadata-seo-and-design-tokens

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main branch
        run: git fetch origin main

      - name: Check if PR already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          EXISTING=$(gh pr list --head "${{ github.ref_name }}" --state open --json number --jq 'length')
          echo "count=$EXISTING" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.check.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="${{ github.ref_name }}"
          COMMIT_MSG=$(git log -1 --format=%s)
          echo "## Description" > pr_body.md
          echo "" >> pr_body.md
          echo "Automated PR for branch \`${BRANCH}\`." >> pr_body.md
          echo "" >> pr_body.md
          echo "### Changes" >> pr_body.md
          git log --oneline --no-decorate | sed 's/^/- /' >> pr_body.md
          echo "" >> pr_body.md
          echo "### Checklist" >> pr_body.md
          echo "- [ ] CI passes" >> pr_body.md
          echo "- [ ] Code reviewed" >> pr_body.md
          
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$COMMIT_MSG" \
            --body-file pr_body.md \
            --label "auto-pr"