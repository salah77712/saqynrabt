name: Dependabot Auto-Merge
on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          PR_URL="https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          BODY=$(gh pr view "$PR_URL" --json body --jq '.body')
          FROM=$(echo "$BODY" | grep -oP 'from \K\d+' | head -1)
          TO=$(echo "$BODY" | grep -oP 'to \K\d+' | head -1)
          DEP=$(echo "$BODY" | grep -oP 'Bumps \`\K[^`]+' | head -1)
          echo "Dependency: $DEP | From major: $FROM | To major: $TO"
          if [ "$FROM" = "$TO" ] || [ "$DEP" = "actions/checkout" ]; then
            echo "Safe update - approving and enabling auto-merge"
            gh pr review --approve "$PR_URL"
            gh pr merge --auto --squash "$PR_URL"
          else
            echo "Major version bump - skipping auto-merge"
            gh pr comment "$PR_URL" --body "⚠️ **Major version bump** (\`${DEP}\`: ${FROM} → ${TO}). Auto-merge skipped. Tracked for consolidated batch PR." || true
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
