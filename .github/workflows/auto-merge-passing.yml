name: Auto-merge passing PRs

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      github.event.pull_request.user.login == github.actor ||
      contains(github.event.pull_request.labels.*.name, 'auto-pr')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // Check CI status
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
            });
            
            const allPassing = checks.check_runs.every(
              r => r.conclusion === 'success' || r.conclusion === 'neutral'
            );
            
            if (!allPassing) {
              console.log('CI not all green yet. Skipping merge.');
              return;
            }

            // Check if already merged
            if (pr.merged) {
              console.log('Already merged.');
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
              });
              console.log('Merged successfully.');
            } catch (e) {
              console.log('Merge failed:', e.message);
            }
