name: Auto-merge passing PRs

on:
  check_suite:
    types: [completed]
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      github.event.pull_request.user.login == github.actor ||
      contains(github.event.pull_request.labels.*.name, 'auto-pr')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Check check runs (produced by workflow jobs)
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
            });

            // Check commit statuses (produced by individual CI steps)
            const { data: status } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
            });

            const hasChecks = checks.check_runs.length > 0;
            const hasStatuses = status.statuses.length > 0;

            if (!hasChecks && !hasStatuses) {
              console.log('No CI checks found. Skipping merge.');
              return;
            }

            const checksPassing = !hasChecks || checks.check_runs.every(
              r => r.conclusion === 'success' || r.conclusion === 'neutral'
            );

            const statusesPassing = !hasStatuses || status.state === 'success';

            if (!checksPassing || !statusesPassing) {
              console.log('CI not all green yet. Skipping merge.');
              return;
            }

            // Check if already merged
            if (pr.merged) {
              console.log('Already merged.');
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
              });
              console.log('Merged successfully.');
            } catch (e) {
              console.log('Merge failed:', e.message);
            }
